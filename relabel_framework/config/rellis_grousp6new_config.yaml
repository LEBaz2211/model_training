dataset:
  name: Rellis
  root_dir: data/rellis
  images_dir: "images" # Folder containing the RGB images
  labels_dir: "labels" # Folder containing the annotation (label) images
  list_files:
    train: "train.txt"
    val: "val.txt"
    test: "test.txt"

classes:
  base_classes:
    - "void"
    - "dirt"
    - "grass"
    - "tree"
    - "pole"
    - "water"
    - "sky"
    - "vehicle"
    - "object"
    - "asphalt"
    - "building"
    - "log"
    - "person"
    - "fence"
    - "bush"
    - "concrete"
    - "barrier"
    - "puddle"
    - "mud"
    - "rubble"
  palette:
    - [0, 0, 0]
    - [108, 64, 20]
    - [0, 102, 0]
    - [0, 255, 0]
    - [0, 153, 153]
    - [0, 128, 255]
    - [0, 0, 255]
    - [255, 255, 0]
    - [255, 0, 127]
    - [64, 64, 64]
    - [255, 0, 0]
    - [102, 0, 0]
    - [204, 153, 255]
    - [102, 0, 204]
    - [255, 153, 204]
    - [170, 170, 170]
    - [41, 121, 255]
    - [134, 255, 239]
    - [99, 66, 34]
    - [110, 22, 138]
  groups: [0, 2, 4, 0, 0, 0, 0, 0, 0, 1, 0, 4, 0, 0, 4, 1, 0, 0, 2, 3]
  # Mapping raw values (IDs) to group values.
  id_mapping:
    {
      0: 0,
      1: 2,
      3: 4,
      4: 0,
      5: 0,
      6: 0,
      7: 0,
      8: 0,
      9: 0,
      10: 1,
      12: 0,
      15: 4,
      17: 0,
      18: 0,
      19: 4,
      23: 1,
      27: 0,
      31: 0,
      33: 2,
      34: 3,
    }
  # Mapping raw values (IDs) to sequential indices (0-19) for visualization.
  id_seq:
    {
      0: 0,
      1: 1,
      3: 2,
      4: 3,
      5: 4,
      6: 5,
      7: 6,
      8: 7,
      9: 8,
      10: 9,
      12: 10,
      15: 11,
      17: 12,
      18: 13,
      19: 14,
      23: 15,
      27: 16,
      31: 17,
      33: 18,
      34: 19,
    }

superclasses:
  mapping:
    "0": "Background/Obstacle"
    "1": "Stable"
    "2": "Granular"
    "3": "Poor_Foothold"
    "4": "High_Resistance"
  # Superclass palette: customize these colors as desired.
  palette:
    - [128, 128, 128] # Background/Obstacle
    - [0, 255, 0] # Stable
    - [255, 255, 0] # Granular
    - [140, 86, 75] # Poor_Foothold
    - [214, 39, 40] # High_Resistance

output:
  new_annotation_suffix: "_group6new"
  new_list_prefix: "new_"
  output_dirs:
    annotations: "output/new_annotations"
    lists: "output/new_lists"
    visuals: "output/visuals"
