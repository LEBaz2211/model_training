dataset:
  name: Rellis
  root_dir: data/rellis
  images_dir: "images" # Folder containing the RGB images
  labels_dir: "labels" # Folder containing the annotation (label) images
  list_files:
    train: "train.txt"
    val: "val.txt"
    test: "test.txt"

classes:
  base_classes:
    - "void" # 0
    - "dirt" # 1
    - "grass" # 2
    - "tree" # 3
    - "pole" # 4
    - "water" # 5
    - "sky" # 6
    - "vehicle" # 7
    - "object" # 8
    - "asphalt" # 9
    - "building" # 10
    - "log" # 11
    - "person" # 12
    - "fence" # 13
    - "bush" # 14
    - "concrete" # 15
    - "barrier" # 16
    - "puddle" # 17
    - "mud" # 18
    - "rubble" # 19
  palette:
    - [0, 0, 0]
    - [108, 64, 20]
    - [0, 102, 0]
    - [0, 255, 0]
    - [0, 153, 153]
    - [0, 128, 255]
    - [0, 0, 255]
    - [255, 255, 0]
    - [255, 0, 127]
    - [64, 64, 64]
    - [255, 0, 0]
    - [102, 0, 0]
    - [204, 153, 255]
    - [102, 0, 204]
    - [255, 153, 204]
    - [170, 170, 170]
    - [41, 121, 255]
    - [134, 255, 239]
    - [99, 66, 34]
    - [110, 22, 138]
  groups: [0, 2, 4, 5, 5, 5, 0, 5, 5, 1, 5, 4, 5, 5, 5, 1, 5, 5, 2, 3]
  # Mapping raw values (IDs) to group values.
  id_mapping:
    {
      0: 0,
      1: 2,
      3: 3,
      4: 5,
      5: 5,
      6: 5,
      7: 0,
      8: 5,
      9: 5,
      10: 1,
      12: 5,
      15: 4,
      17: 5,
      18: 5,
      19: 5,
      23: 1,
      27: 5,
      31: 5,
      33: 2,
      34: 3,
    }
  # Mapping raw values (IDs) to sequential indices (0-19) for visualization.
  id_seq:
    {
      0: 0,
      1: 1,
      3: 2,
      4: 3,
      5: 4,
      6: 5,
      7: 6,
      8: 7,
      9: 8,
      10: 9,
      12: 10,
      15: 11,
      17: 12,
      18: 13,
      19: 14,
      23: 15,
      27: 16,
      31: 17,
      33: 18,
      34: 19,
    }

superclasses:
  mapping:
    "0": "Background"
    "1": "Stable"
    "2": "Granular"
    "3": "Poor_Foothold"
    "4": "High_Resistance"
    "5": "Obstacle"
  palette:
    - [128, 128, 128] # Background
    - [44, 160, 44] # Stable
    - [255, 255, 0] # Granular
    - [255, 127, 14] # Poor_Foothold
    - [214, 39, 40] # High_Resistance
    - [31, 119, 180] # Obstacle

output:
  new_annotation_suffix: "_test2"
  new_list_prefix: "test2_"
  output_dirs:
    annotations: "output/rellis/test2_annotations"
    lists: "output/rellis/test2_lists"
    visuals: "output/rellis/test2/visuals"
