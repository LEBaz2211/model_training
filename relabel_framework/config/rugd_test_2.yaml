superclasses:
  mapping:
    "0": "Background"
    "1": "Stable"
    "2": "Granular"
    "3": "Poor_foothold"
    "4": "High_resistance"
    "5": "Obstacle"
  # Palette for superclasses – customize as desired
  palette:
    - [128, 128, 128] # Background
    - [44, 160, 44] # Stable
    - [255, 255, 0] # Granular
    - [255, 127, 14] # Poor_Foothold
    - [214, 39, 40] # High_Resistance
    - [31, 119, 180] # Obstacle

